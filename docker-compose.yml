version: "3.8"

services:
  # ─── PostgreSQL Database ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hcgeo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hcgeogestao}
      POSTGRES_USER: ${POSTGRES_USER:-hcgeo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hcgeo_secret_2026}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./hcgeogestao-api/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hcgeo} -d ${POSTGRES_DB:-hcgeogestao}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hcgeo-net

  # ─── Nginx Reverse Proxy (Subdomains & SSL) ────────────────────────
  proxy:
    image: nginx:stable-alpine
    container_name: hcgeo-proxy
    restart: unless-stopped
    ports:
        - "80:80"
        - "443:443"
    volumes:
        - ./nginx-proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
        - ./certbot/conf:/etc/letsencrypt
        - ./certbot/www:/var/www/certbot
    depends_on:
        - frontend
        - api
    networks:
        - hcgeo-net

  # ─── SSL Certificate Manager (Certbot) ──────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: hcgeo-certbot
    volumes:
        - ./certbot/conf:/etc/letsencrypt
        - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
        - hcgeo-net

  # ─── Frontend (Vite + React → Nginx) ──────────────────────────────
  frontend:
    image: hcgeo-frontend:latest
    build:
      context: ./hcgeogestao
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api-hcgeo.nikoscience.tech}
    ports:
      - "${FRONTEND_PORT:-8585}:80"
    container_name: hcgeo-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api
    networks:
      - hcgeo-net

  # ─── Backend API (Node.js / Express) ───────────────────────────────
  api:
    image: hcgeo-api:latest
    build:
      context: ./hcgeogestao-api
      dockerfile: Dockerfile
    container_name: hcgeo-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-hcgeo}:${POSTGRES_PASSWORD:-hcgeo_secret_2026}@db:5432/${POSTGRES_DB:-hcgeogestao}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_me_2026}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://hcgeo.nikoscience.tech}
      FINANCEIRO_VAULT_PASSWORD: ${FINANCEIRO_VAULT_PASSWORD}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
    ports:
      - "${API_PORT:-4545}:3000"
    command: npm run dev
    volumes:
      - ./hcgeogestao-api:/app
      - /app/node_modules
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hcgeo-net

volumes:
  pgdata:
    driver: local

networks:
  hcgeo-net:
    driver: bridge
