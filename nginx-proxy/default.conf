# ─── FRONTEND SERVER ───
server {
    listen 443 ssl;
    server_name hcgeo.nikoscience.tech;

    ssl_certificate /etc/letsencrypt/live/hcgeo.nikoscience.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hcgeo.nikoscience.tech/privkey.pem;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── BACKEND API SERVER ───
server {
    listen 443 ssl;
    server_name api-hcgeo.nikoscience.tech;

    ssl_certificate /etc/letsencrypt/live/hcgeo.nikoscience.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hcgeo.nikoscience.tech/privkey.pem;

    location / {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
